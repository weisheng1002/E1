            {
                id: "group_1", type: "reading", title: "題組 21-25",
                article_en: "Watching movies is a popular hobby for many people. Some enjoy watching action or adventure films because they are exciting and full of (21) ___. Others prefer romantic or comedy movies that make them feel (22) ___ and relaxed. Some students like to watch movies in English to (23) ___ their language skills, while others prefer films in their own language because it is easier to understand. Watching movies at home is (24) ___ and convenient, but going to the cinema can feel special and fun, especially with friends. Many students enjoy discussing their favorite characters or stories with others after watching. Whether it is a blockbuster or a small indie film, movies are a great way to (25) ___ everyday life and experience something new. What kind of movies do you like to watch?",
                article_zh: "看電影是許多人受歡迎的嗜好。有些人喜歡看動作片或冒險片，因為它們很刺激且充滿了 (21) ___。其他人則偏好能讓他們感到 (22) ___ 和放鬆的浪漫片或喜劇片。有些學生喜歡看英文電影來 (23) ___ 他們的語言能力，而其他人則偏好看自己母語的電影，因為這樣比較容易理解。在家看電影既 (24) ___ 又方便，但去電影院會讓人覺得特別又有趣，尤其是和朋友一起去的時候。許多學生喜歡在觀影後與其他人討論他們最喜歡的角色或故事。無論是賣座鉅片還是一部小型的獨立電影，電影都是一個能讓人 (25) ___ 日常生活並體驗新事物的好方法。你喜歡看哪種類型的電影呢？",
                questions: [
                    { id: "21", en: "21. Some enjoy watching action or adventure films because they are exciting and full of (21) ___.", zh: "有些人喜歡看動作片或冒險片，因為它們很刺激且充滿了 (21) ___。", options: [{key:"A",en:"endings",zh:"結局"},{key:"B",en:"opportunities",zh:"機會"},{key:"C",en:"routines",zh:"例行公事"},{key:"D",en:"surprises",zh:"驚喜"}], answer: "D", explanation: "語境推導：動作片(action)與冒險片(adventure)的特色就是刺激且充滿了「驚奇 (surprises)」。" },
                    { id: "22", en: "22. Others prefer romantic or comedy movies that make them feel (22) ___ and relaxed.", zh: "其他人則偏好能讓他們感到 (22) ___ 和放鬆的浪漫片或喜劇片。", options: [{key:"A",en:"furious",zh:"狂怒的"},{key:"B",en:"happy",zh:"快樂的"},{key:"C",en:"lonely",zh:"寂寞的"},{key:"D",en:"tired",zh:"疲累的"}], answer: "B", explanation: "語意並列：與 relaxed (放鬆的) 並列的正面情緒。看浪漫喜劇片會讓人感到「快樂 (happy)」。" },
                    { id: "23", en: "23. Some students like to watch movies in English to (23) ___ their language skills...", zh: "有些學生喜歡看英文電影來 (23) ___ 他們的語言能力...", options: [{key:"A",en:"engage",zh:"參與"},{key:"B",en:"improve",zh:"改善"},{key:"C",en:"speak",zh:"說話"},{key:"D",en:"wonder",zh:"納悶"}], answer: "B", explanation: "常見搭配詞：improve skills (增進技能)。看英文電影的目的通常是為了「增進」語言能力。" },
                    { id: "24", en: "24. Watching movies at home is (24) ___ and convenient...", zh: "在家看電影既 (24) ___ 又方便...", options: [{key:"A",en:"comfortable",zh:"舒適的"},{key:"B",en:"familiar",zh:"熟悉的"},{key:"C",en:"hardworking",zh:"勤奮的"},{key:"D",en:"stressful",zh:"有壓力的"}], answer: "A", explanation: "語意並列：與 convenient (方便的) 並列的優點。在家看電影既「舒適 (comfortable)」又方便。" },
                    { id: "25", en: "25. ...movies are a great way to (25) ___ everyday life and experience something new.", zh: "...電影是一個能讓人 (25) ___ 日常生活並體驗新事物的好方法。", options: [{key:"A",en:"convince",zh:"說服"},{key:"B",en:"escape",zh:"逃避"},{key:"C",en:"predict",zh:"預測"},{key:"D",en:"watch",zh:"觀看"}], answer: "B", explanation: "片語記憶：escape everyday life (逃離日常生活的繁瑣)。電影是讓人暫時抽離現實的好方法。" }
                ]
            },
            {
                id: "group_2", type: "reading", title: "題組 26-30",
                article_en: "Dunedin Airport in New Zealand has set a three-minute limit (26) ___ farewell hugs in its drop-off zone. The rule, marked by a sign saying “Max hug time 3 minutes. For fonder farewells please use the car park,” is meant to keep the area from getting too crowded. Dan De Bono, the airport’s chief executive, explained that (27) ___ using harsh fines or warnings, they wanted a friendly approach to encourage people to move along after saying goodbye. He noted that while airports are emotional places (28) ___ farewells are often long, it is important to make space for everyone. The new rule has caused quite a stir online. Some people think it is a fun idea, while others feel it is unnecessary. However, there will not be any “hug police” (29) ___ embraces; staff will simply remind people to move (30) ___ they are taking too long.",
                article_zh: "紐西蘭的達尼丁機場在其下車區（臨停區）對送別擁抱設下了三分鐘的限制 (26) ___。這項規定由一個寫著「最長擁抱時間3分鐘。若要更深情的告別，請使用停車場」的告示牌來標示，目的是為了防止該區域變得過於擁擠。該機場的執行長 Dan De Bono 解釋說，(27) ___ 使用嚴厲的罰款或警告，他們希望用一種友善的方式來鼓勵人們在道別後繼續往前移動。他指出，雖然機場是個充滿情感的地方，(28) ___ 告別的時間通常都很長，但為每個人騰出空間是很重要的。這項新規定在網路上引起了不小的轟動。有些人認為這是一個有趣的點子，而其他人則覺得這沒有必要。然而，這裡不會有任何「擁抱警察」來為擁抱 (29) ___；(30) ___ 人們花費了太長時間，工作人員只會簡單地提醒他們移動。",
                questions: [
                    { id: "26", en: "26. Dunedin Airport in New Zealand has set a three-minute limit (26) ___ farewell hugs...", zh: "紐西蘭的達尼丁機場在下車區對送別擁抱設下了三分鐘的限制 (26) ___。", options: [{key:"A",en:"about",zh:"關於"},{key:"B",en:"between",zh:"在...之間"},{key:"C",en:"into",zh:"進入"},{key:"D",en:"on",zh:"在...之上"}], answer: "D", explanation: "介系詞搭配：put a limit on sth. (對...設下限制)。" },
                    { id: "27", en: "27. ...explained that (27) ___ using harsh fines or warnings, they wanted a friendly approach...", zh: "...解釋說，(27) ___ 使用嚴厲的罰款或警告，他們想要用一種友善的方式...", options: [{key:"A",en:"apart",zh:"除了...之外"},{key:"B",en:"spite",zh:"儘管"},{key:"C",en:"except",zh:"除了...以外"},{key:"D",en:"rather",zh:"而不是"}], answer: "D", explanation: "前後對比：句意為「『而不是』使用嚴厲的罰款，他們想要用友善的方式」。前後形成強烈對比。" },
                    { id: "28", en: "28. He noted that while airports are emotional places (28) ___ farewells are often long...", zh: "他指出，雖然機場是充滿情感的地方，(28) ___ 送別通常很長...", options: [{key:"A",en:"what",zh:"什麼"},{key:"B",en:"where",zh:"在哪裡"},{key:"C",en:"which",zh:"哪一個"},{key:"D",en:"whose",zh:"誰的"}], answer: "B", explanation: "文法解析：先行詞為 places (地方)，後方為完整子句，因此需使用關係副詞 where 來引導。" },
                    { id: "29", en: "29. However, there will not be any \"hug police\" (29) ___ embraces;", zh: "然而，不會有任何「擁抱警察」來 (29) ___ 擁抱時間；", options: [{key:"A",en:"had timed",zh:"過去完成式"},{key:"B",en:"has timed",zh:"現在完成式"},{key:"C",en:"timed",zh:"過去分詞"},{key:"D",en:"timing",zh:"計時"}], answer: "D", explanation: "分詞構句：修飾名詞 hug police，表示主動進行「計時」的動作，需使用現在分詞 V-ing。" },
                    { id: "30", en: "30. ...staff will simply remind people to move (30) ___ they are taking too long.", zh: "...工作人員只會簡單地提醒人們移動 (30) ___ 他們花費太多時間。", options: [{key:"A",en:"if",zh:"如果"},{key:"B",en:"though",zh:"雖然"},{key:"C",en:"until",zh:"直到"},{key:"D",en:"whereas",zh:"然而"}], answer: "A", explanation: "條件句邏輯：「如果 (if)」他們花費太多時間，員工就會簡單地提醒他們移動。" }
                ]
            },
            {
                id: "group_3", type: "reading", title: "題組 31-35",
                article_en: "There are many types of transportation people use in their daily lives. Some prefer cars because they offer privacy and comfort, making them ideal for families or long trips. Others rely on public transportation, like buses and trains, which are economical and more eco-friendly. For those who want to stay fit and avoid traffic, bicycles are a great choice, while walking is perfect for nearby destinations. In busy cities, subways and trams provide a fast and reliable way to travel without being delayed by road congestion. Airplanes are the quickest option for traveling far distances, but they tend to be costly. Ultimately, people decide how to travel based on factors like convenience, expense, and how far they need to go.",
                article_zh: "人們在日常生活中會使用許多種類的交通工具。有些人偏好汽車，因為它們提供隱私與舒適，使其成為家庭或長途旅行的理想選擇。其他人則依賴大眾運輸工具，像是公車和火車，它們既經濟實惠又更具環保效益。對於那些想要保持健康並避開交通壅塞的人來說，腳踏車是一個很棒的選擇，而走路則非常適合前往附近的目的地。在繁忙的城市中，地鐵和路面電車提供了一種快速且可靠的旅行方式，不會因道路壅塞而受到延誤。飛機是長途旅行最快的選擇，但它們往往很昂貴。最終，人們會根據便利性、花費以及他們需要前往的距離等因素，來決定要如何出行。",
                questions: [
                    { id: "31", en: "31. Why do some people prefer cars, according to the passage?", zh: "根據文章，為什麼有些人偏好汽車？", options: [{key:"A",en:"They are clearly the fastest option for travel.",zh:"最快的選擇"},{key:"B",en:"They can help people avoid crowded areas.",zh:"避開擁擠區域"},{key:"C",en:"They provide a relaxing personal space.",zh:"提供放鬆個人空間"},{key:"D",en:"They seem safest and easiest for long trips.",zh:"最安全簡單"}], answer: "C", explanation: "文章提到 Cars ... offer privacy and comfort (提供隱私與舒適)，對應選項的 personal space。" },
                    { id: "32", en: "32. What makes public transportation popular, according to the passage?", zh: "根據文章，是什麼讓大眾運輸受歡迎？", options: [{key:"A",en:"It is affordable and good for the environment.",zh:"負擔得起且對環境友善"},{key:"B",en:"It is faster because it avoids road construction.",zh:"更快避開施工"},{key:"C",en:"It is helpful for shy people to connect with friends.",zh:"有助於害羞的人"},{key:"D",en:"It is perfect for shorter journeys within the city.",zh:"適合短途"}], answer: "A", explanation: "文章提到大眾運輸是 economical and more eco-friendly (經濟實惠且更環保)。" },
                    { id: "33", en: "33. Which transportation is a good choice for health-conscious people, according to the passage?", zh: "根據文章，哪種交通工具是注重健康的人的好選擇？", options: [{key:"A",en:"Bikes.",zh:"腳踏車"},{key:"B",en:"Buses.",zh:"公車"},{key:"C",en:"Trains.",zh:"火車"},{key:"D",en:"Trams.",zh:"路面電車"}], answer: "A", explanation: "文章提到對於想 stay fit (保持健康身材) 的人來說，bicycles are a great choice。" },
                    { id: "34", en: "34. What is the disadvantage of traveling by airplane, according to the passage?", zh: "根據文章，搭飛機旅行的缺點是什麼？", options: [{key:"A",en:"It can be scary for some travelers.",zh:"可能很可怕"},{key:"B",en:"It creates delays during busy hours.",zh:"會造成延誤"},{key:"C",en:"It is crowded and uncomfortable.",zh:"很擁擠且不舒服"},{key:"D",en:"It is expensive for long journeys.",zh:"很昂貴"}], answer: "D", explanation: "文章提到搭飛機最快，但 they tend to be costly (它們往往很昂貴)。" },
                    { id: "35", en: "35. What helps people select their mode of transportation, according to the passage?", zh: "根據文章，什麼幫助人們選擇他們的交通方式？", options: [{key:"A",en:"The availability of public services.",zh:"公共服務的可用性"},{key:"B",en:"The need for exercise and privacy.",zh:"運動和隱私的需求"},{key:"C",en:"The price, ease, and distance.",zh:"價格、便利性與距離"},{key:"D",en:"The time of day and traffic patterns.",zh:"時間與交通模式"}], answer: "C", explanation: "文章結論指出選擇取決於 convenience, expense, and how far they need to go (便利、花費與距離)。" }
                ]
            },
            {
                id: "group_4", type: "reading", title: "題組 36-40",
                article_en: "Artificial intelligence (AI) is transforming the music industry. In recent years, AI has been used to create music that sounds like it was made by humans. This development has brought both opportunities and challenges to the industry.\n\nOne of the main advantages of AI-made music is that it can be produced quickly and at a low cost. With AI tools, artists can create new sounds, melodies, and even full songs in just a few minutes. AI can also help composers by suggesting musical ideas, making the creative process faster and easier.\n\nHowever, AI-made music also raises some concerns. Some musicians worry that AI could replace human artists and threaten their music careers. Others believe that AI music lacks emotional depth that human musicians bring to their work. They argue that AI cannot truly understand real emotions.\n\nAI-made music also brings up legal and ethical questions. For example, if an AI creates a hit song, who owns the rights to that song—the AI developer or the person who used it?\n\nAI-made music is likely to continue growing and changing the music industry. It is up to the industry to find a balance between the advantages of AI and the unique value of human creativity.",
                article_zh: "人工智慧 (AI) 正在改變音樂產業。近年來，AI 已被用來創作聽起來像是人類製作的音樂。這項發展為該產業帶來了機遇與挑戰。\n\nAI 製作音樂的主要優點之一是，它可以快速且低成本地產出。藉助 AI 工具，藝術家可以在短短幾分鐘內創造出新的聲音、旋律，甚至是完整的歌曲。AI 還可以透過提供音樂上的靈感來幫助作曲家，使創作過程變得更快、更容易。\n\n然而，AI 製作的音樂也引起了一些擔憂。有些音樂家擔心 AI 可能會取代人類藝術家，並威脅他們的音樂職業生涯。其他人則認為，AI 音樂缺乏人類音樂家賦予作品的情感深度。他們主張 AI 無法真正理解真實的情感。\n\nAI 製作的音樂同時也帶來了法律與道德問題。舉例來說，如果 AI 創作了一首暢銷歌曲，誰擁有那首歌的權利（版權）——是 AI 開發者還是使用它的人？\n\nAI 製作的音樂可能會持續成長並改變音樂產業。這有賴於該產業在 AI 的優勢與人類創造力的獨特價值之間找到平衡。",
                questions: [
                    { id: "36", en: "36. According to the passage, what is the benefit of using AI to create music?", zh: "根據文章，使用AI創作音樂的好處是什麼？", options: [{key:"A",en:"It allows for better collaboration between artists.",zh:"允許更好的合作"},{key:"B",en:"It enhances the quality of music production.",zh:"提升音樂品質"},{key:"C",en:"It helps human artists develop their unique style.",zh:"發展獨特風格"},{key:"D",en:"It saves time and money in music production.",zh:"在音樂製作上省時省錢"}], answer: "D", explanation: "文章提到 AI 製作音樂的最大優勢是 produced quickly and at a low cost (能快速且低成本製作)。" },
                    { id: "37", en: "37. Why are some musicians concerned about AI-made music?", zh: "為什麼有些音樂家對AI製作的音樂感到擔憂？", options: [{key:"A",en:"AI could make human musicians unnecessary.",zh:"可能使人類音樂家變得不必要"},{key:"B",en:"It is simply too expensive to produce AI music.",zh:"太貴了"},{key:"C",en:"They do not have a big AI music production team.",zh:"沒有龐大團隊"},{key:"D",en:"Using AI to create music is very complex.",zh:"非常複雜"}], answer: "A", explanation: "文章指出音樂家擔憂 AI could replace human artists (AI 可能取代人類藝術家)。" },
                    { id: "38", en: "38. What does the passage suggest about AI's ability to experience emotions?", zh: "文章對於AI體驗情感的能力有何暗示？", options: [{key:"A",en:"AI can learn emotions from human musicians.",zh:"可以學習情感"},{key:"B",en:"AI is able to replicate human emotions.",zh:"能夠複製人類情感"},{key:"C",en:"AI lacks the ability to feel emotions like humans.",zh:"缺乏感受情感的能力"},{key:"D",en:"AI understands emotions better than humans.",zh:"比人類更了解情感"}], answer: "C", explanation: "文章提到反對者主張 AI cannot truly understand real emotions (AI 無法真正理解真實情感)。" },
                    { id: "39", en: "39. The passage mentions a legal challenge regarding AI-made music. What is this challenge mainly about?", zh: "文章提到了一個關於AI製作音樂的法律挑戰。這個挑戰主要是關於什麼？", options: [{key:"A",en:"How can musicians add emotions to AI-made music?",zh:"如何加入情感"},{key:"B",en:"How do we improve the quality of AI-made music?",zh:"如何提升品質"},{key:"C",en:"Who possesses the rights to AI-made music?",zh:"誰擁有權利/版權"},{key:"D",en:"Who will protect AI-made music from piracy?",zh:"誰來保護免受盜版"}], answer: "C", explanation: "文章提出的法律疑問是 who owns the rights to that song (誰擁有那首歌的權利)。" },
                    { id: "40", en: "40. Which of the following is the best title for this passage?", zh: "下列哪一項是這篇文章最好的標題？", options: [{key:"A",en:"How AI Is Changing Music Production",zh:"AI如何正在改變音樂製作"},{key:"B",en:"The Costs of AI Technology in the Music Industry",zh:"AI技術的成本"},{key:"C",en:"The End of Human Creativity in Music",zh:"創造力的終結"},{key:"D",en:"Why AI Music Will Replace Human Artists",zh:"為何將取代人類藝術家"}], answer: "A", explanation: "文章首句即破題 AI is transforming the music industry，並客觀論述了優點與挑戰，(A)最為全面。" }
                ]
            }
        ];

        const { useState, useEffect, useRef } = React;

        // 工具：拆解字串為可點擊單字
        const ClickableText = ({ text, onWordClick }) => {
            const parts = text.split(/([a-zA-Z]+(?:'[a-zA-Z]+)?)/g);
            return (
                <span>
                    {parts.map((part, index) => {
                        if (/^[a-zA-Z]+(?:'[a-zA-Z]+)?$/.test(part)) {
                            return (
                                <span 
                                    key={index} 
                                    onClick={(e) => { e.stopPropagation(); onWordClick(part); }}
                                    className="clickable-word font-medium"
                                >
                                    {part}
                                </span>
                            );
                        }
                        return <span key={index}>{part}</span>;
                    })}
                </span>
            );
        };

        const App = () => {
            const [selectedWord, setSelectedWord] = useState(null);
            const [fontSizeLevel, setFontSizeLevel] = useState(1); // 1 (16px), 2 (20px), 3 (26px)

            // 全站字體放大機制：修改 HTML 根元素的 font-size，讓所有使用 rem 的 Tailwind class 一起等比例放大
            useEffect(() => {
                const sizes = { 1: '16px', 2: '20px', 3: '26px' };
                document.documentElement.style.fontSize = sizes[fontSizeLevel];
            }, [fontSizeLevel]);

            // 單字發音與翻譯
            const handleWordClick = (word) => {
                const cleanWord = word.toLowerCase().replace(/[^a-z]/g, '');
                if (!cleanWord) return;

                speakTextWithBlank(cleanWord);
                const translation = vocabDictionary[cleanWord] || null;
                setSelectedWord({ word: cleanWord, translation });
            };

            // 全句語音朗讀 - 支援雙語切換 (遇到 ___ 唸「空格」)
            const speakTextWithBlank = (text) => {
                if (!('speechSynthesis' in window)) return;
                window.speechSynthesis.cancel(); // 停止目前所有發音

                // 過濾掉題號如 "1. " 讓朗讀更順暢
                let cleanText = text.replace(/^\d+\.\s*/, '');

                // 根據底線 ___ 分割字串
                const parts = cleanText.split('___');

                parts.forEach((part, index) => {
                    // 1. 朗讀英文段落
                    if (part.trim() !== "") {
                        const enUtterance = new SpeechSynthesisUtterance(part);
                        enUtterance.lang = 'en-US';
                        enUtterance.rate = 0.85; // 放慢語速
                        window.speechSynthesis.speak(enUtterance);
                    }
                    
                    // 2. 如果不是最後一個段落，代表中間有被分割的 ___，插入中文「空格」
                    if (index < parts.length - 1) {
                        const zhUtterance = new SpeechSynthesisUtterance("空格");
                        zhUtterance.lang = 'zh-TW'; // 強制使用中文引擎唸出「空格」
                        zhUtterance.rate = 0.85;
                        window.speechSynthesis.speak(zhUtterance);
                    }
                });
            };

            // 關閉翻譯面板
            useEffect(() => {
                const closePopup = () => setSelectedWord(null);
                document.addEventListener('click', closePopup);
                return () => document.removeEventListener('click', closePopup);
            }, []);

            return (
                <div className="min-h-screen pb-40">
                    {/* 無障礙工具列 (Accessibility Toolbar) - 固定在最上方 */}
                    <div className="bg-gray-800 text-white p-3 sticky top-0 z-50 flex flex-wrap justify-between items-center shadow-lg border-b-4 border-yellow-400">
                        <div className="flex items-center gap-2 mb-2 sm:mb-0">
                            <i data-lucide="eye" className="w-6 h-6 text-yellow-400"></i>
                            <span className="font-bold text-lg">無障礙版 (語音定點提示)</span>
                        </div>
                        <div className="flex gap-4">
                            {/* 字體放大按鈕 */}
                            <div className="flex bg-gray-700 rounded-lg overflow-hidden border border-gray-600">
                                <button 
                                    onClick={() => setFontSizeLevel(1)} 
                                    className={`px-4 py-2 font-bold ${fontSizeLevel === 1 ? 'bg-blue-600' : 'hover:bg-gray-600'}`}
                                >
                                    標準 A
                                </button>
                                <button 
                                    onClick={() => setFontSizeLevel(2)} 
                                    className={`px-4 py-2 font-bold text-lg ${fontSizeLevel === 2 ? 'bg-blue-600' : 'hover:bg-gray-600'}`}
                                >
                                    放大 A+
                                </button>
                                <button 
                                    onClick={() => setFontSizeLevel(3)} 
                                    className={`px-4 py-2 font-bold text-xl ${fontSizeLevel === 3 ? 'bg-blue-600' : 'hover:bg-gray-600'}`}
                                >
                                    特大 A++
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 標題區 */}
                    <header className="bg-blue-800 text-white p-6 shadow-md">
                        <div className="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <h1 className="text-2xl font-bold flex items-center gap-2">
                                <i data-lucide="book-open" className="w-8 h-8"></i>
                                114學年度身障甄試-四技組英文科
                            </h1>
                            <div className="text-base bg-blue-900 px-4 py-2 rounded-lg font-bold border-2 border-blue-400">
                                💡 點擊英文單字翻譯 / 點擊喇叭聽整句(遇底線會提示「空格」)
                            </div>
                        </div>
                    </header>

                    {/* 主要內容區塊 */}
                    <main className="max-w-5xl mx-auto p-4 mt-4 space-y-8">
                        {testData.map((item) => {
                            if (item.type === "single") {
                                return <QuestionCard key={item.id} question={item} onWordClick={handleWordClick} onSpeak={speakTextWithBlank} />;
                            } else if (item.type === "reading") {
                                return <ReadingGroupCard key={item.id} group={item} onWordClick={handleWordClick} onSpeak={speakTextWithBlank} />;
                            }
                            return null;
                        })}
                    </main>

                    {/* 固定式大字體翻譯面板 (Fixed Bottom Panel) */}
                    {selectedWord && (
                        <div 
                            id="dict-panel"
                            className="fixed bottom-0 left-0 w-full bg-white shadow-[0_-10px_40px_rgba(0,0,0,0.2)] p-6 z-50 border-t-8 border-blue-500"
                            onClick={(e) => e.stopPropagation()}
                        >
                            <div className="max-w-5xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-6">
                                <div className="flex items-center gap-6">
                                    <button 
                                        onClick={() => speakTextWithBlank(selectedWord.word)} 
                                        className="p-4 bg-blue-100 text-blue-800 rounded-full hover:bg-blue-200 border-2 border-blue-300"
                                    >
                                        <i data-lucide="volume-2" className="w-10 h-10"></i>
                                    </button>
                                    <div>
                                        <div className="text-5xl font-extrabold mb-2 tracking-wide text-blue-900">{selectedWord.word}</div>
                                        <div className="text-3xl font-bold text-gray-800">
                                            {selectedWord.translation || "(系統暫無內建翻譯)"}
                                        </div>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => setSelectedWord(null)} 
                                    className="px-8 py-4 bg-gray-200 text-gray-800 text-xl font-bold rounded-xl hover:bg-gray-300 border-2 border-gray-400 flex items-center gap-2"
                                >
                                    <i data-lucide="x-circle" className="w-8 h-8"></i> 關閉翻譯
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 單選題組件 ---
        const QuestionCard = ({ question, onWordClick, onSpeak }) => {
            const [showTranslate, setShowTranslate] = useState(false);
            const [showAnswer, setShowAnswer] = useState(false);

            return (
                <div className="bg-white p-6 rounded-2xl shadow-sm border-2 border-gray-300">
                    {/* 題幹區 & 朗讀按鈕 */}
                    <div className="flex items-start gap-4 mb-4">
                        <button 
                            onClick={() => onSpeak(question.en)}
                            className="shrink-0 p-3 bg-green-100 text-green-800 rounded-xl hover:bg-green-200 border-2 border-green-300 flex items-center justify-center mt-1"
                            title="朗讀全句 (遇空格會以中文提示)"
                        >
                            <i data-lucide="volume-2" className="w-6 h-6"></i>
                        </button>
                        <div className="text-[1.2em] font-medium leading-relaxed">
                            <ClickableText text={question.en} onWordClick={onWordClick} />
                        </div>
                    </div>
                    
                    {showTranslate && (
                        <div className="ml-16 mb-6 p-4 bg-gray-50 rounded-xl border-l-8 border-blue-400 text-[1.1em] text-gray-700 font-bold">
                            {question.zh}
                        </div>
                    )}

                    {/* 選項區 */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        {question.options.map(opt => (
                            <div key={opt.key} className="flex p-4 border-2 rounded-xl hover:bg-blue-50 transition items-center">
                                <span className="font-bold text-[1.2em] mr-4 text-blue-800 bg-blue-100 px-3 py-1 rounded-lg">
                                    {opt.key}
                                </span>
                                <div className="flex-1 flex flex-col">
                                    <div className="text-[1.2em] font-medium">
                                        <ClickableText text={opt.en} onWordClick={onWordClick} />
                                    </div>
                                    {showTranslate && <div className="text-[1em] text-gray-500 mt-2 font-bold">{opt.zh}</div>}
                                </div>
                                <button 
                                    onClick={(e) => { e.stopPropagation(); onSpeak(opt.en); }}
                                    className="ml-2 p-2 text-gray-500 hover:text-blue-600 rounded-full hover:bg-gray-200"
                                >
                                    <i data-lucide="volume-1" className="w-6 h-6"></i>
                                </button>
                            </div>
                        ))}
                    </div>

                    {/* 互動按鈕區 */}
                    <div className="flex flex-wrap gap-4 border-t-2 pt-6">
                        <button 
                            onClick={() => setShowTranslate(!showTranslate)}
                            className="px-6 py-3 bg-blue-100 text-blue-800 rounded-xl font-bold border-2 border-blue-300 flex items-center gap-2"
                        >
                            <i data-lucide="languages" className="w-6 h-6"></i>
                            {showTranslate ? "隱藏中文" : "顯示中文"}
                        </button>
                        <button 
                            onClick={() => setShowAnswer(!showAnswer)}
                            className="px-6 py-3 bg-purple-100 text-purple-800 rounded-xl font-bold border-2 border-purple-300 flex items-center gap-2"
                        >
                            <i data-lucide="help-circle" className="w-6 h-6"></i>
                            {showAnswer ? "隱藏解析" : "看解答與解析"}
                        </button>
                    </div>

                    {/* 解析區塊 */}
                    {showAnswer && (
                        <div className="mt-6 p-5 bg-purple-50 rounded-xl border-2 border-purple-200">
                            <div className="font-black text-purple-900 text-[1.3em] mb-3 border-b-2 border-purple-200 pb-2">
                                🎯 正確答案：{question.answer}
                            </div>
                            <div className="text-gray-800 text-[1.1em] font-medium leading-relaxed">
                                {question.explanation}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 閱讀題組件 ---
        const ReadingGroupCard = ({ group, onWordClick, onSpeak }) => {
            const [showTranslate, setShowTranslate] = useState(false);

            return (
                <div className="bg-white rounded-2xl shadow-sm border-2 border-gray-300 overflow-hidden">
                    <div className="bg-gray-800 text-white py-3 px-6 text-[1.2em] font-bold flex items-center gap-3">
                        <i data-lucide="file-text" className="w-7 h-7"></i>
                        {group.title}
                    </div>
                    <div className="p-6 md:p-8 border-b-2 border-gray-300">
                        {/* 朗讀全文按鈕 */}
                        <button 
                            onClick={() => onSpeak(group.article_en)}
                            className="mb-6 px-6 py-3 bg-green-100 text-green-800 rounded-xl font-bold border-2 border-green-300 flex items-center gap-2"
                        >
                            <i data-lucide="play-circle" className="w-6 h-6"></i> 語音朗讀整篇文章
                        </button>

                        <div className="prose max-w-none text-[1.2em] leading-loose font-medium text-gray-800">
                            {group.article_en.split('\n').map((para, i) => (
                                <p key={i} className="mb-6 indent-8">
                                    <ClickableText text={para} onWordClick={onWordClick} />
                                </p>
                            ))}
                        </div>
                        
                        {showTranslate && (
                            <div className="mt-8 pt-6 border-t-4 border-dashed border-gray-300">
                                <h4 className="font-bold text-gray-600 mb-4 flex items-center gap-2 text-[1.2em]">
                                    <i data-lucide="languages" className="w-6 h-6"></i>
                                    文章中文翻譯：
                                </h4>
                                <div className="text-gray-700 leading-relaxed text-[1.1em] font-bold">
                                    {group.article_zh.split('\n').map((para, i) => (
                                        <p key={i} className="mb-4 indent-8">{para}</p>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                        <div className="mt-6">
                            <button 
                                onClick={() => setShowTranslate(!showTranslate)}
                                className="px-6 py-3 bg-blue-100 text-blue-800 rounded-xl font-bold border-2 border-blue-300 flex items-center gap-2"
                            >
                                <i data-lucide="eye" className="w-6 h-6"></i>
                                {showTranslate ? "隱藏文章翻譯" : "顯示文章翻譯"}
                            </button>
                        </div>
                    </div>

                    <div className="bg-gray-50 p-6 md:p-8 space-y-8">
                        <h3 className="font-bold text-gray-800 border-b-2 border-gray-300 pb-3 flex items-center gap-3 text-[1.3em]">
                            <i data-lucide="edit-3" className="w-7 h-7"></i>
                            根據上文回答下列問題：
                        </h3>
                        {group.questions.map(q => (
                            <QuestionCard key={q.id} question={q} onWordClick={onWordClick} onSpeak={onSpeak} />
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setTimeout(() => {
            lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
